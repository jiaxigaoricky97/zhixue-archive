<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>智学档案 · 国际教育学生成长系统</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/tabler-icons/3.34.0/iconfont/tabler-icons.min.css">
<style>
:root{
  --bg:#f5f6fb; --surface:#ffffff; --line:#eceef5; --line-2:#e2e5f0;
  --ink:#1b1f33; --ink-2:#5a6076; --ink-3:#9197ad;
  --brand:#6d5cf0; --brand-soft:#efecff;
  --blue:#3b82f6; --blue-soft:#e8f1ff;
  --teal:#10b3a3; --teal-soft:#dff7f3;
  --amber:#f59e0b; --amber-soft:#fff2da;
  --violet:#8b5cf6; --violet-soft:#f1ebff;
  --rose:#f43f6e; --rose-soft:#ffe7ee;
  --green:#22b07d; --green-soft:#dff7ec;
  --cyan:#06b6d4; --cyan-soft:#defaff;
  --orange:#f97316; --orange-soft:#ffeede;
  --indigo:#5b6cf0; --indigo-soft:#e9ecff;
  --radius:14px; --radius-sm:10px;
  --shadow:0 1px 2px rgba(27,31,51,.04), 0 6px 22px rgba(27,31,51,.05);
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Noto Sans SC',-apple-system,system-ui,sans-serif;background:var(--bg);color:var(--ink);font-size:14px;line-height:1.6;-webkit-font-smoothing:antialiased}
.app{display:grid;grid-template-columns:236px 1fr;min-height:100vh}
button{font-family:inherit;cursor:pointer;border:none;background:none}

/* ===== Sidebar ===== */
.side{background:var(--surface);border-right:1px solid var(--line);padding:18px 14px;display:flex;flex-direction:column;position:sticky;top:0;height:100vh}
.brand{display:flex;align-items:center;gap:10px;padding:6px 8px 18px}
.brand .logo{width:34px;height:34px;border-radius:10px;background:linear-gradient(135deg,var(--brand),#9c7bff);color:#fff;display:flex;align-items:center;justify-content:center;font-size:19px}
.brand .name{font-weight:700;font-size:15px;line-height:1.1}
.brand .sub{font-size:11px;color:var(--ink-3)}
.role-switch{display:flex;background:var(--bg);border-radius:10px;padding:3px;margin-bottom:16px}
.role-switch button{flex:1;font-size:11.5px;padding:7px 2px;border-radius:8px;color:var(--ink-2);font-weight:500;transition:.15s}
.role-switch button.on{background:var(--surface);color:var(--brand);box-shadow:var(--shadow)}
.nav-label{font-size:11px;color:var(--ink-3);padding:10px 10px 6px;letter-spacing:.04em}
.nav a{display:flex;align-items:center;gap:11px;padding:9px 11px;border-radius:10px;color:var(--ink-2);font-size:13.5px;font-weight:500;margin-bottom:2px;transition:.12s}
.nav a i{font-size:18px;width:20px;text-align:center}
.nav a:hover{background:var(--bg)}
.nav a.on{background:var(--brand-soft);color:var(--brand)}
.side-foot{margin-top:auto;padding:12px 10px 4px;border-top:1px solid var(--line);font-size:11px;color:var(--ink-3)}

/* ===== Main ===== */
.main{display:flex;flex-direction:column;min-width:0}
.topbar{background:var(--surface);border-bottom:1px solid var(--line);padding:13px 26px;display:flex;align-items:center;gap:16px;position:sticky;top:0;z-index:20}
.stu-select{display:flex;align-items:center;gap:10px;background:var(--bg);border:1px solid var(--line);border-radius:12px;padding:6px 10px 6px 7px;cursor:pointer;transition:.15s}
.stu-select:hover{border-color:var(--line-2)}
.avatar{width:34px;height:34px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:14px;flex-shrink:0}
.stu-select .meta .nm{font-weight:500;font-size:13.5px;line-height:1.2}
.stu-select .meta .dt{font-size:11px;color:var(--ink-3)}
.top-spacer{flex:1}
.pill{display:inline-flex;align-items:center;gap:5px;font-size:11.5px;font-weight:500;padding:4px 11px;border-radius:20px}
.btn{display:inline-flex;align-items:center;gap:7px;font-size:13px;font-weight:500;padding:8px 15px;border-radius:10px;background:var(--brand);color:#fff;transition:.15s}
.btn:hover{filter:brightness(1.05)}
.btn.ghost{background:var(--surface);color:var(--ink-2);border:1px solid var(--line-2)}
.btn.ghost:hover{background:var(--bg)}
.content{padding:24px 26px 60px;max-width:1080px;width:100%}
.page{display:none;animation:fade .25s ease}
.page.on{display:block}
@keyframes fade{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
.ph{margin-bottom:18px}
.ph h1{font-size:21px;font-weight:700}
.ph p{color:var(--ink-2);font-size:13.5px;margin-top:3px}

/* cards & grid */
.grid{display:grid;gap:14px}
.g2{grid-template-columns:1fr 1fr}
.g3{grid-template-columns:repeat(3,1fr)}
.g4{grid-template-columns:repeat(4,1fr)}
.card{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);padding:16px 18px;box-shadow:var(--shadow)}
.card-h{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.card-h .t{font-weight:500;font-size:14.5px;display:flex;align-items:center;gap:8px}
.ic-badge{width:30px;height:30px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:17px}
.metric{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);padding:15px 17px;box-shadow:var(--shadow)}
.metric .l{font-size:12px;color:var(--ink-2);display:flex;align-items:center;gap:6px}
.metric .v{font-size:27px;font-weight:700;margin-top:6px;letter-spacing:-.01em}
.metric .l i{font-size:15px}

/* student cards */
.stu-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px}
.stu-card{cursor:pointer;transition:.15s}
.stu-card:hover{transform:translateY(-2px);border-color:var(--line-2)}
.bar{height:7px;background:var(--bg);border-radius:20px;overflow:hidden}
.bar > i{display:block;height:100%;border-radius:20px}

/* tabs */
.tabs{display:flex;gap:6px;margin-bottom:16px;flex-wrap:wrap}
.tab{font-size:13px;font-weight:500;padding:7px 14px;border-radius:9px;color:var(--ink-2);background:var(--surface);border:1px solid var(--line)}
.tab.on{background:var(--ink);color:#fff;border-color:var(--ink)}
.subtabs{display:flex;gap:18px;border-bottom:1px solid var(--line);margin-bottom:18px}
.subtab{padding:9px 2px;font-size:13.5px;font-weight:500;color:var(--ink-2);border-bottom:2px solid transparent;margin-bottom:-1px}
.subtab.on{color:var(--ink);border-bottom-color:var(--brand)}

/* upload zone */
.drop{border:1.5px dashed var(--line-2);border-radius:var(--radius);padding:26px;text-align:center;background:var(--surface);transition:.15s;cursor:pointer}
.drop:hover{border-color:var(--brand);background:var(--brand-soft)}
.drop i.big{font-size:32px;color:var(--ink-3)}
.drop .t{font-weight:500;margin-top:8px}
.drop .s{font-size:12px;color:var(--ink-3);margin-top:3px}

/* file list */
.file{display:flex;align-items:center;gap:12px;padding:11px 13px;border:1px solid var(--line);border-radius:var(--radius-sm);background:var(--surface);margin-bottom:9px}
.file .thumb{width:42px;height:42px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0;overflow:hidden}
.file .thumb img{width:100%;height:100%;object-fit:cover}
.file .fmeta{flex:1;min-width:0}
.file .fmeta .fn{font-weight:500;font-size:13px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.file .fmeta .fs{font-size:11.5px;color:var(--ink-3)}
.file .del{color:var(--ink-3);font-size:17px;padding:5px;border-radius:7px}
.file .del:hover{color:var(--rose);background:var(--rose-soft)}
.empty{text-align:center;color:var(--ink-3);font-size:13px;padding:26px 0}

/* tags */
.chip{display:inline-flex;align-items:center;gap:6px;font-size:12px;font-weight:500;padding:5px 11px;border-radius:20px;margin:0 6px 8px 0}
.chip .x{cursor:pointer;opacity:.6}.chip .x:hover{opacity:1}
.lvl-dot{width:7px;height:7px;border-radius:50%}
input,select,textarea{font-family:inherit;font-size:13.5px;border:1px solid var(--line-2);border-radius:10px;padding:9px 12px;width:100%;background:var(--surface);color:var(--ink);outline:none;transition:.15s}
input:focus,select:focus,textarea:focus{border-color:var(--brand);box-shadow:0 0 0 3px var(--brand-soft)}
label.fl{font-size:12px;color:var(--ink-2);font-weight:500;display:block;margin-bottom:6px}
.row{display:flex;gap:10px;align-items:flex-end}

/* checklist */
.chk-section{margin-bottom:18px}
.chk-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:11px}
.chk-head .nm{font-weight:500;display:flex;align-items:center;gap:9px}
.chk-prog{font-size:12px;color:var(--ink-2)}
.chk-item{display:flex;align-items:center;gap:12px;padding:11px 13px;border:1px solid var(--line);border-radius:var(--radius-sm);margin-bottom:8px;background:var(--surface);transition:.12s}
.chk-item.done{background:var(--green-soft);border-color:#cdeede}
.chk-box{width:22px;height:22px;border-radius:7px;border:1.8px solid var(--line-2);display:flex;align-items:center;justify-content:center;flex-shrink:0;cursor:pointer;color:transparent;transition:.12s}
.chk-item.done .chk-box{background:var(--green);border-color:var(--green);color:#fff}
.chk-item .ci-t{flex:1;font-size:13.5px;font-weight:500}
.chk-item .ci-s{font-size:11.5px;color:var(--ink-3);font-weight:400}

/* timeline */
.tl{border-left:2px solid var(--line);padding-left:20px;margin-left:6px}
.tl-item{position:relative;margin-bottom:18px}
.tl-item:last-child{margin-bottom:0}
.tl-dot{position:absolute;left:-27px;top:4px;width:11px;height:11px;border-radius:50%;border:2px solid var(--surface)}
.tl-date{font-size:11.5px;color:var(--ink-3)}
.tl-body{font-size:13.5px;color:var(--ink-2);margin-top:2px}

/* school cards */
.school{display:flex;gap:13px;align-items:center;padding:14px;border:1px solid var(--line);border-radius:var(--radius);margin-bottom:10px;background:var(--surface)}
.school .flag{width:44px;height:44px;border-radius:11px;display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:700;flex-shrink:0}

/* modal */
.modal-bg{display:none;position:fixed;inset:0;background:rgba(27,31,51,.4);z-index:50;align-items:flex-start;justify-content:center;padding:60px 20px;overflow:auto}
.modal-bg.on{display:flex}
.modal{background:var(--surface);border-radius:18px;width:100%;max-width:440px;padding:22px;box-shadow:0 20px 60px rgba(0,0,0,.2)}
.modal h3{font-size:16px;font-weight:700;margin-bottom:4px}
.modal .sub{font-size:12.5px;color:var(--ink-2);margin-bottom:16px}
.modal .fields > *{margin-bottom:12px}
.modal-foot{display:flex;gap:10px;justify-content:flex-end;margin-top:6px}

/* report (parent) */
.report-cover{background:linear-gradient(135deg,#6d5cf0,#8b5cf6);color:#fff;border-radius:18px;padding:26px 28px;margin-bottom:18px}
.report-cover .rc-t{font-size:13px;opacity:.85}
.report-cover h2{font-size:24px;font-weight:700;margin:4px 0 14px}
.report-cover .rc-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px}
.report-cover .rc-grid .v{font-size:20px;font-weight:700}
.report-cover .rc-grid .l{font-size:11.5px;opacity:.8}
.rep-sec{margin-bottom:20px}
.rep-sec .rs-h{font-size:15px;font-weight:700;margin-bottom:12px;display:flex;align-items:center;gap:9px;padding-bottom:8px;border-bottom:1px solid var(--line)}
.rep-sec .rs-h .num{width:24px;height:24px;border-radius:7px;background:var(--brand-soft);color:var(--brand);font-size:12px;display:flex;align-items:center;justify-content:center}

@media(max-width:920px){.app{grid-template-columns:1fr}.side{display:none}.g2,.g3,.g4,.stu-grid,.report-cover .rc-grid{grid-template-columns:1fr 1fr}.content{padding:18px}}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);background:var(--ink);color:#fff;padding:11px 20px;border-radius:12px;font-size:13px;font-weight:500;z-index:80;transition:.3s;display:flex;align-items:center;gap:8px;opacity:0}
.toast.on{transform:translateX(-50%);opacity:1}
</style>
</head>
<body>
<div class="app">
  <!-- ============ SIDEBAR ============ -->
  <aside class="side">
    <div class="brand">
      <div class="logo"><i class="ti ti-school"></i></div>
      <div><div class="name">智学档案</div><div class="sub">国际教育成长系统</div></div>
    </div>
    <div class="role-switch">
      <button data-role="teach" class="on" onclick="setRole('teach')">授课</button>
      <button data-role="plan" onclick="setRole('plan')">规划</button>
      <button data-role="student" onclick="setRole('student')">学生</button>
      <button data-role="parent" onclick="setRole('parent')">家长</button>
    </div>
    <nav class="nav" id="nav"></nav>
    <div class="side-foot">© 2026 智学档案 · 演示版</div>
  </aside>

  <!-- ============ MAIN ============ -->
  <div class="main">
    <div class="topbar">
      <div class="stu-select" onclick="openStuPicker()">
        <div class="avatar" id="tb-av"></div>
        <div class="meta"><div class="nm" id="tb-nm"></div><div class="dt" id="tb-dt"></div></div>
        <i class="ti ti-chevron-down" style="color:var(--ink-3);font-size:16px"></i>
      </div>
      <div class="top-spacer"></div>
      <span class="pill" id="tb-pill"></span>
      <button class="btn ghost" id="tb-export" onclick="exportPDF()" style="display:none"><i class="ti ti-download"></i> 导出家长报告</button>
      <button class="btn" onclick="exportData()" title="导出你在网页里的全部修改（标签/大纲/分值/报错）到下载文件夹，下载后发我一句『导出了』，我就读取并写进源代码、重新部署"><i class="ti ti-cloud-upload"></i> 导出修改 → 同步给作者</button>
    </div>

    <div class="content" id="content"></div>
  </div>
</div>

<div class="modal-bg" id="modal-bg"><div class="modal" id="modal"></div></div>
<div class="toast" id="toast"></div>
<div id="buildstamp" style="position:fixed;bottom:5px;right:9px;font-size:10px;color:#c0c3cc;z-index:9999;pointer-events:none"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
<script>
/* ============================================================
   DATA MODEL
============================================================ */
/* ----- IB 评估目标 (Assessment Objectives) 作为题目能力维度 ----- */
const IB_AO = [
  {id:'AO1', n:'知识与理解'},
  {id:'AO2', n:'应用与分析'},
  {id:'AO3', n:'综合与评价'},
  {id:'AO4', n:'技能与技术'},
];
/* ----- 大纲样板：IB Diploma。topics→kps 为可点选的最小知识点标签 ----- */
/* ⬇⬇ 待替换区：收到真实考试局大纲后，按此结构替换 topics / kps 即可 ⬇⬇ */
const SUBJECTS = {
  math: {name:'Mathematics: Analysis and Approaches HL', sys:'IB', board:'IB Diploma · Math AA HL', objectives:IB_AO,
    abilities:['计算准确性','数学建模','逻辑证明','应试速度'],
    topics:[
      {id:'T1', n:'Topic 1: Number & Algebra', wt:'5–12', cats:[
        {id:'1.1', n:'Sequence and series', kps:[{id:'1.1.1',n:'Arithmetic sequence and series'},{id:'1.1.2',n:'Geometric sequence and series'},{id:'1.1.3',n:'Sum of infinite geometric sequence'},{id:'1.1.4',n:'Financial applications'}]},
        {id:'1.2', n:'Permutations and combinations', kps:[{id:'1.2.1',n:'Permutations and combinations'}]},
        {id:'1.3', n:'Binomial theorem', kps:[{id:'1.3.1',n:'Binomial theorem (n ∈ Z+)'},{id:'1.3.2',n:'Binomial with negative and fractional indices (n ∈ Q)'}]},
        {id:'1.4', n:'Complex number', kps:[{id:'1.4.1',n:'Complex number basics'},{id:'1.4.2',n:'Cartesian form (Argand diagram), polar form (De Moivre\'s theorem) and Euler form'},{id:'1.4.3',n:'Power and roots of complex number'}]},
        {id:'1.5', n:'Proof', kps:[{id:'1.5.1',n:'Proof by mathematical induction'},{id:'1.5.2',n:'Proof by contradiction and counterexample'}]}
      ]},
      {id:'T2', n:'Topic 2: Functions', wt:'7–15', cats:[
        {id:'2.1', n:'Properties of functions', kps:[{id:'2.1.1',n:'Domain, range, composite function and inverse function'},{id:'2.1.2',n:'Graph sketching (|f(x)|, f(|x|), 1/f(x), f(ax+b))'},{id:'2.1.3',n:'Odd and even function'}]},
        {id:'2.2', n:'Linear functions', kps:[{id:'2.2.1',n:'Linear functions'}]},
        {id:'2.3', n:'Quadratics', kps:[{id:'2.3.1',n:'Forms, equations and inequalities'},{id:'2.3.2',n:'Discriminant and roots'}]},
        {id:'2.4', n:'Rational functions', kps:[{id:'2.4.1',n:'(ax+b)/(cx+d) form'},{id:'2.4.2',n:'(ax+b)/(cx²+dx+e) and (ax²+bx+c)/(dx+e) form'}]},
        {id:'2.5', n:'Exponential and logarithmic functions', kps:[{id:'2.5.1',n:'Law of exponents and logarithms'},{id:'2.5.2',n:'Function properties'},{id:'2.5.3',n:'Equations'}]},
        {id:'2.6', n:'Polynomials', kps:[{id:'2.6.1',n:'Operations'},{id:'2.6.2',n:'Factor theorem and remainder theorem'},{id:'2.6.3',n:'Sum and product of the roots theorem'}]},
        {id:'2.7', n:'Function transformation', kps:[{id:'2.7.1',n:'Function transformation'}]}
      ]},
      {id:'T3', n:'Topic 3: Geometry and Trigonometry', wt:'5–20', cats:[
        {id:'3.1', n:'Geometry and shapes', kps:[{id:'3.1.1',n:'Triangle (sine rule, cosine rule, area, bearings and angle of elevation and depression)'},{id:'3.1.2',n:'Arc length and sector area'},{id:'3.1.3',n:'2D and 3D application'}]},
        {id:'3.2', n:'Trigonometric function', kps:[{id:'3.2.1',n:'Trigonometric graphs'},{id:'3.2.2',n:'Trigonometric identities'},{id:'3.2.3',n:'Trigonometric equations'},{id:'3.2.4',n:'Inverse trigonometry'}]},
        {id:'3.3', n:'Vector basics', kps:[{id:'3.3.1',n:'Vector algebra and operations'},{id:'3.3.2',n:'Scalar product and vector product'}]},
        {id:'3.4', n:'Vector applications: lines', kps:[{id:'3.4.1',n:'Equation of a line'},{id:'3.4.2',n:'Angle between two lines'},{id:'3.4.3',n:'Shortest distance from a point to a line'},{id:'3.4.4',n:'Relationship between two lines'},{id:'3.4.5',n:'Shortest distance between two parallel or skew lines'},{id:'3.4.6',n:'Constant velocity problems'}]},
        {id:'3.5', n:'Vector applications: planes', kps:[{id:'3.5.1',n:'Equation of a plane'},{id:'3.5.2',n:'Angle between a line and a plane or two planes'},{id:'3.5.3',n:'Shortest distance from a point to a plane'},{id:'3.5.4',n:'Intersection between a line and a plane'},{id:'3.5.5',n:'Intersecting planes and system of linear equations'}]}
      ]},
      {id:'T4', n:'Topic 4: Statistics and Probability', wt:'3–10', cats:[
        {id:'4.1', n:'Basic statistics', kps:[{id:'4.1.1',n:'Univariate statistics'},{id:'4.1.2',n:'Bivariate statistics (including linear regression)'}]},
        {id:'4.2', n:'Probability', kps:[{id:'4.2.1',n:'Combined events'},{id:'4.2.2',n:'Independent and mutually exclusive events'},{id:'4.2.3',n:'Conditional probability (including Bayes\' theorem)'}]},
        {id:'4.3', n:'Probability distribution', kps:[{id:'4.3.1',n:'Probability distribution for random variables and expectation'},{id:'4.3.2',n:'Properties of aX+b'},{id:'4.3.3',n:'Binomial distribution'},{id:'4.3.4',n:'Normal distribution'},{id:'4.3.5',n:'Probability density function (including discrete and continuous random variables)'}]}
      ]},
      {id:'T5', n:'Topic 5: Calculus', wt:'8–31', cats:[
        {id:'5.1', n:'Differentiation', kps:[{id:'5.1.1',n:'Rules of differentiation'},{id:'5.1.2',n:'Second and higher derivatives'},{id:'5.1.3',n:'Implicit differentiation'}]},
        {id:'5.2', n:'Properties of a curve', kps:[{id:'5.2.1',n:'Tangents and normals'},{id:'5.2.2',n:'Increasing and decreasing intervals'},{id:'5.2.3',n:'Concavity and inflection point'},{id:'5.2.4',n:'Stationary points and testing for local maximum and minimum'},{id:'5.2.5',n:'Graphical behavior of functions'},{id:'5.2.6',n:'Limits and l\'Hôpital\'s rule'}]},
        {id:'5.3', n:'Applications of differentiation', kps:[{id:'5.3.1',n:'Optimization problems'},{id:'5.3.2',n:'Related rate of change'}]},

/* ---------- shared bits ---------- */
function fileItem(f,bucket,i){
  const isImg=f.url;
  const thumb=isImg?`<img src="${f.url}">`:`<i class="ti ${f.ic}"></i>`;
  return `<div class="file">
    <div class="thumb" style="background:var(--${f.c}-soft);color:var(--${f.c})">${thumb}</div>
    <div class="fmeta"><div class="fn">${f.n}</div><div class="fs">${f.s} · ${f.d}</div>
      ${f.aud?`<audio controls src="${f.aud}" style="width:100%;margin-top:7px;height:34px"></audio>`:''}</div>
    <button class="del" title="下载 PDF" onclick="downloadFile('${bucket}',${i})"><i class="ti ti-download" style="font-size:16px"></i></button>
    <button class="del" onclick="delFile('${bucket}',${i})"><i class="ti ti-trash"></i></button>
  </div>`;
}
function uploader(bucket,ic,color,hint,accept){
  return `<div class="drop" onclick="document.getElementById('inp-${bucket}').click()">
    <i class="ti ${ic} big"></i><div class="t">点击上传 / 拖拽文件到此</div><div class="s">${hint}</div>
    <input type="file" id="inp-${bucket}" style="display:none" multiple ${accept?`accept="${accept}"`:''} onchange="onUpload(event,'${bucket}','${ic}','${color}')">
  </div>`;
}
function fileList(bucket){
  const arr=S()[bucket]||[];
  if(!arr.length) return `<div class="empty"><i class="ti ti-inbox" style="font-size:24px;display:block;margin-bottom:6px"></i>暂无文件</div>`;
  return arr.map((f,i)=>fileItem(f,bucket,i)).join('');
}
function onUpload(e,bucket,ic,color){
  [...e.target.files].forEach(file=>{
    const sz=(file.size/1048576).toFixed(1)+' MB';
    const r=new FileReader();
    r.onload=ev=>{
      const rec={n:file.name,s:sz,ic,c:color,d:dateStr(),data:ev.target.result};
      if(file.type.startsWith('image/'))rec.url=ev.target.result;
      if(file.type.startsWith('audio/'))rec.aud=ev.target.result;
      S()[bucket].unshift(rec);save();renderPage();
    };
    r.readAsDataURL(file);
  });
  toast('上传成功，已关联到 '+curStuObj().name);
}
function delFile(bucket,i){S()[bucket].splice(i,1);save();renderPage();}
function downloadFile(bucket,i){
  const f=S()[bucket][i];
  if(f.data){const a=document.createElement('a');a.href=f.data;a.download=f.n;document.body.appendChild(a);a.click();a.remove();toast('开始下载：'+f.n);return;}
  const el=document.createElement('div');
  el.style.cssText='padding:34px;font-family:Noto Sans SC,sans-serif;width:560px;color:#1b1f33';
  el.innerHTML=`<h2 style="color:#6d5cf0">智学档案 · 文件导出（演示）</h2><hr style="border:none;border-top:1px solid #eee;margin:14px 0">
    <p><b>文件名：</b>${f.n}</p><p><b>学生：</b>${curStuObj().name} ${curStuObj().en}</p><p><b>导出时间：</b>${new Date().toLocaleString('zh-CN')}</p>
    <p style="color:#999;margin-top:20px;font-size:13px">说明：此为演示导出文件。正式版将统一导出为标准 PDF（保留原始作业/批改/试卷内容）。</p>`;
  document.body.appendChild(el);
  html2pdf().set({margin:10,filename:f.n.replace(/\.[^.]+$/,'')+'.pdf',jsPDF:{unit:'mm',format:'a4'}}).from(el).save().then(()=>el.remove());
  toast('已导出 PDF：'+f.n);
}
function dateStr(){const d=new Date();return (d.getMonth()+1).toString().padStart(2,'0')+'.'+d.getDate().toString().padStart(2,'0');}

}
function addKP(sub){
  const id=document.getElementById('kp-ch').value;const info=kpInfo(sub,id)||{n:id,topic:'',cat:''};
  const lv=document.getElementById('kp-lv').value;
  const arr=S().kpTags[sub];const ex=arr.find(t=>t.id===id);
  if(ex){ex.lv=lv;toast('已更新：'+info.n+' → '+lv);}else{arr.push({id,topic:info.topic,cat:info.cat,n:info.n,lv});toast('已标注：'+info.n);}
  save();renderPage();
}

  return `<div class="ph"><h1>能力项标签</h1><p>不同学科的能力维度不同，针对性标注学生的强弱项。</p></div>

s/AAHL-2025Nov-TZ2-P2_q1_2.png", "text": "Hence, or otherwise, solve the equation 3cos 2x + 11sin x − 6 = 0 for 0° ≤ x ≤ 180°.", "kps": ["3.2.3"], "stars": 3, "ms": "qimages/AAHL-2025Nov-TZ2-P2ms_q1_b.png"}], "year": 2025, "session": "Nov", "tz": "TZ2"}, {"id": "AAHL-2025Nov-TZ2-P2_q2", "source": "2025 Nov TZ2 P2 Q2", "subject": "AAHL", "paper": "P2", "marks": 6, "stem": "A teacher sets her class of 30 pupils a quiz. Aiden and Brett were absent on the day of the quiz. The following box and whisker diagram shows the results of the 28 pupils who took the quiz on the day. quiz quiz score score Aiden and Brett take the quiz when they return. Aiden scores less than 6 . Brett scores more than 17 .", "stemImg": "qimages/AAHL-2025Nov-TZ2-P2_q2_stem.png", "status": "ai", "ms": null, "parts": [{"label": "(a)", "marks": 1, "img": "qimages/AAHL-2025Nov-TZ2-P2_q2_1.png", "text": "Explain, briefly, why the median score for all 30 pupils would still be 10.5 .", "kps": ["4.1.1"], "stars": 2, "ms": "qimages/AAHL-2025Nov-TZ2-P2ms_q2_a.png"}, {"label": "(b)", "marks": 5, "img": "qimages/AAHL-2025Nov-TZ2-P2_q2_2.png", "text": "The mean score of the 28 pupils was 10.5 . The mean score for all 30 pupils is now 10.6 . The range of scores for all 30 pupils is 14 . Determine Aiden’s score and Brett’s score.", "kps": ["2.1.1", "4.1.1"], "stars": 4, "ms": "qimages/AAHL-2025Nov-TZ2-P2ms_q2_b.png"}], "year": 2025, "session": "Nov", "tz": "TZ2"}, {"id": "AAHL-2025Nov-TZ2-P2_q3", "source": "2025 Nov TZ2 P2 Q3", "subject": "AAHL", "paper": "P2", "marks": 6, "stem": "Consider a circle and a sector. The radius of the circle is 8 mm . The radius of the sector is r mm and the acute angle at the centre is q radians. This is shown in the following diagram. diagram not to scale r 8 θ The perimeter of the sector is 1.5 times the circumference of the circle.", "stemImg": "qimages/AAHL-2025Nov-TZ2-P2_q3_stem.png", "status": "ai", "ms": null, "parts": [{"label": "(a)", "marks": 3, "img": "qimages/AAHL-2025Nov-TZ2-P2_q3_1.png", "text": "Show that r .", "kps": ["3.1.2"], "stars": 3, "ms": "qimages/AAHL-2025Nov-TZ2-P2ms_q3_a.png"}, {"label": "(b)", "marks": 3, "img": "qimages/AAHL-2025Nov-TZ2-P2_q3_2.png", "text": "It is given that the area of the circle is the same as the area of the sector. Determine the value of q .", "kps": ["3.1.2"], "stars": 3, "ms": "qimages/AAHL-2025Nov-TZ2-P2ms_q3_b.png"}], "year": 2025, "session": "Nov", "tz": "TZ2"}, {"id": "AAHL-2025Nov-TZ2-P2_q4", "source": "2025 Nov TZ2 P2 Q4", "subject": "AAHL", "paper": "P2", "marks": 7, "stem": "A garden centre sells seeds for two varieties of sunflowers: large and giant. The heights of large sunflowers are normally distributed with mean m and standard deviation s . It is known that 25 % of large sunflowers have a height of over 180 cm .", "stemImg": "qimages/AAHL-2025Nov-TZ2-P2_q4_stem.png", "status": "ai", "ms": null, "parts": [{"label": "(a)", "marks": 3, "img": "qimages/AAHL-2025Nov-TZ2-P2_q4_1.png", "text": "Given that m + As = 180 , where A ∈  , find the value of A .", "kps": ["4.3.4"], "stars": 3, "ms": "qimages/AAHL-2025Nov-TZ2-P2ms_q4_a.png"}, {"label": "(b)", "marks": 4, "img": "qimages/AAHL-2025Nov-TZ2-P2_q4_2.png", "text": "The heights of giant sunflowers are also normally distributed. The giant sunflowers have a mean height that is 35 cm more than that of the large sunflowers and a standard deviation that is double that of the large sunflowers. It is known that 98 % of giant sunflowers have a height greater than 180 cm . Determine m and s .", "kps": ["4.1.1"], "stars": 3, "ms": "qimages/AAHL-2025Nov-TZ2-P2ms_q4_b.png"}], "year": 2025, "session": "Nov", "tz": "TZ2"}, {"id": "AAHL-2025Nov-TZ2-P2_q5", "source": "2025 Nov TZ2 P2 Q5", "subject": "AAHL", "paper": "P2", "marks": 5, "stem": "", "stemImg": null, "status": "ai", "ms": null, "parts": [{"label": "—", "marks": 5, "img": "qimages/AAHL-2025Nov-TZ2-P2_q5_1.png", "text": "3 x Consider the function f (x) = e 4 , where x ≥ 0 . The region enclosed by the curve y = f (x) , the line y = 8 and the y-axis is rotated by 2p radians about the y-axis to form a solid. This is shown in the following diagrams. y x Find the volume of the solid formed.", "kps": ["3.1.2", "5.5.4"], "stars": 4, "ms": "qimages/AAHL-2025Nov-TZ2-P2ms_q5_—.png"}], "year": 2025, "session": "Nov", "tz": "TZ2"}, {"id": "AAHL-2025Nov-TZ2-P2_q6", "source": "2025 Nov TZ2 P2 Q6", "subject": "AAHL", "paper": "P2", "marks": 7, "stem": "", "stemImg": null, "status": "ai", "ms": null, "parts": [{"label": "—", "marks": 7, "img": "qimages/AAHL-2025Nov-TZ2-P2_q6_1.png", "text": "Consider the quadratic polynomial given by P (x) = 2x2 + qx + r where q , r ∈  . The equation P (x) = 0 has roots a and b , where a , b ∈  . When P (x) is divided by (x + 1) , the remainder is 12 . Given that , find the value of q and the value of r .", "kps": ["2.3.1", "2.6.1", "4.2.1"], "stars": 4, "ms": "qimages/AAHL-2025Nov-TZ2-P2ms_q6_—.png"}], "year": 2025, "session": "Nov", "tz": "TZ2"}, {"id": "AAHL-2025Nov-TZ2-P2_q7", "source": "2025 Nov TZ2 P2 Q7", "subject": "AAHL", "paper": "P2", "marks": 6, "stem": "Consider the following two equations. 2x + 6y − 8z = 13 3x - y + 3z = 12", "stemImg": "qimages/AAHL-2025Nov-TZ2-P2_q7_stem.png", "status": "ai", "ms": null, "parts": [{"label": "(a)", "marks": 2, "img": "qimages/AAHL-2025Nov-TZ2-P2_q7_1.png", "text": "Determine the general solution giving the answer in parametric form.", "kps": ["3.5.5"], "stars": 2, "ms": "qimages/AAHL-2025Nov-TZ2-P2ms_q7_a.png"}, {"label": "(b)", "marks": 2, "img": "qimages/AAHL-2025Nov-TZ2-P2_q7_2.png", "text": "Consider a third equation ax + 12y − 16z = k , where a , k ∈  . In the case where a = 3 and k = -3 , determine the unique solution to the system of three equations.", "kps": ["3.5.5"], "stars": 2, "ms": "qimages/AAHL-2025Nov-TZ2-P2ms_q7_b.png"}, {"label": "(c)(i)", "marks": 1, "img": "qimages/AAHL-2025Nov-TZ2-P2_q7_3.png", "text": "Write down the value of a for which there is no unique solution to the system of three equations.", "kps": ["3.5.5"], "stars": 2, "ms": "qimages/AAHL-2025Nov-TZ2-P2ms_q7_c-i.png"}, {"label": "(c)(ii)", "marks": 1, "img": "qimages/AAHL-2025Nov-TZ2-P2_q7_4.png", "text": "Hence, write down the corresponding value of k for which there is an infinite number of solutions to the system of three equations.", "kps": ["3.5.5"], "stars": 2, "ms": "qimages/AAHL-2025Nov-TZ2-P2ms_q7_c-ii.png"}], "year": 2025, "session": "Nov", "tz": "TZ2"}, {"id": "AAHL-2025Nov-TZ2-P2_q8", "source": "2025 Nov TZ2 P2 Q8", "subject": "AAHL", "paper": "P2", "marks": 7, "stem": "Malik owns 15 recipe books which he bought while travelling.", "stemImg": "qimages/AAHL-2025Nov-TZ2-P2_q8_stem.png", "status": "ai", "ms": null, "parts": [{"label": "(a)", "marks": 1, "img": "qimages/AAHL-2025Nov-TZ2-P2_q8_1.png", "text": "Find the number of different ways of arranging the books in a line on a shelf.", "kps": ["1.2.1"], "stars": 2, "ms": "qimages/AAHL-2025Nov-TZ2-P2ms_q8_a.png"}, {"label": "(b)", "marks": 3, "img": "qimages/AAHL-2025Nov-TZ2-P2_q8_2.png", "text": "Malik’s books were bought in three continents. Six books are from Asia, five from Europe and four from Africa. Malik decides to arrange the books on the shelf so that the books from each of the continents are grouped together. Determine the number of different ways that Malik can do this.", "kps": ["1.2.1"], "stars": 3, "ms": "qimages/AAHL-2025Nov-TZ2-P2ms_q8_b.png"}, {"label": "(c)", "marks": 3, "img": "qimages/AAHL-2025Nov-TZ2-P2_q8_3.png", "text": "Malik chooses four books, all from the same continent. Determine the number of different choices Malik could make.", "kps": ["1.2.1"], "stars": 3, "ms": "qimages/AAHL-2025Nov-TZ2-P2ms_q8_c.png"}], "year": 2025, "session": "Nov", "tz": "TZ2"}, {"id": "AAHL-2025Nov-TZ2-P2_q9", "source": "2025 Nov TZ2 P2 Q9", "subject": "AAHL", "paper": "P2", "marks": 5, "stem": "", "stemImg": null, "status": "ai", "ms": null, "parts": [{"label": "—", "marks": 5, "img": "qimages/AAHL-2025Nov-TZ2-P2_q9_1.png", "text": "1 ∈ Prove by contradiction that 2 xy 2 x y for all x , y + .", "kps": ["1.5.2"], "stars": 4, "ms": "qimages/AAHL-2025Nov-TZ2-P2ms_q9_—.png"}], "year": 2025, "session": "Nov", "tz": "TZ2"}, {"id": "AAHL-2025Nov-TZ2-P2_q10", "source": "2025 Nov TZ2 P2 Q10", "subject": "AAHL", "paper": "P2", "marks": 17, "stem": "A particle P moves in a straight line so that its displacement, s cm , from a fixed point O at 1 t 2 t time t seconds is given by s (t) 2 5 sin , where t ≥ 0 . The following diagram shows part of the graph of y = s (t) . s (t) t", "stemImg": "qimages/AAHL-2025Nov-TZ2-P2_q10_stem.png", "status": "ai", "ms": null, "parts": [{"label": "(a)(i)", "marks": 2, "img": "qimages/AAHL-2025Nov-TZ2-P2_q10_1.png", "text": "Find the maximum displacement of P from O ;", "kps": ["5.6.1"], "stars": 2, "ms": "qimages/AAHL-2025Nov-TZ2-P2ms_q10_a-i.png"}, {"label": "(a)(ii)", "marks": 3, "img": "qimages/AAHL-2025Nov-TZ2-P2_q10_2.png", "text": "the maximum velocity of P .", "kps": ["5.6.1"], "stars": 3, "ms": "qimages/AAHL-2025Nov-TZ2-P2ms_q10_a-ii.png"}, {"label": "(b)(i)", "marks": 2, "img": "qimages/AAHL-2025Nov-TZ2-P2_q10_3.png", "text": "Find the minimum value of the displacement function s (t) ;", "kps": ["5.6.1"], "stars": 2, "ms": "qimages/AAHL-2025Nov-TZ2-P2ms_q10_b-i.png"}, {"label": "(b)(ii)", "marks": 1, "img": "qimages/AAHL-2025Nov-TZ2-P2_q10_4.png", "text": "the displacement of P from O when t = 3.5 .", "kps": ["5.6.1"], "stars": 2, "ms": "qimages/AAHL-2025Nov-TZ2-P2ms_q10_b-ii.png"}, {"label": "(c)", "marks": 3, "img": "qimages/AAHL-2025Nov-TZ2-P2_q10_5.png", "text": "Hence, determine the total distance travelled by P in the first 3.5 seconds.", "kps": ["5.6.1"], "stars": 3, "ms": "qimages/AAHL-2025Nov-TZ2-P2ms_q10_c.png"}, {"label": "(d)", "marks": 1, "img": "qimages/AAHL-2025Nov-TZ2-P2_q10_6.png", "text": "The first time that P returns and passes through O is when t = T . Write down the value of T .", "kps": ["5.6.1"], "stars" const FEEDBACK = JSON.parse(localStorage.getItem('zhixue_feedback')||'{}');
function saveFeedback(){localStorage.setItem('zhixue_feedback',JSON.stringify(FEEDBACK));}
/* ===== 一键导出全部修改 → 下载文件夹；用户发"导出了"，作者用 Bash 读取并写回源代码+部署 ===== */
function exportData(){
  const data={build:BUILD, exportedAt:new Date().toISOString(),
    qb:QB, syl:{edits:SYL_EDITS,adds:SYL_ADDS,dels:SYL_DELS}, feedback:FEEDBACK};
  const blob=new Blob([JSON.stringify(data)],{type:'application/json'});
  const a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download='zhixue_export.json';
  document.body.appendChild(a); a.click(); setTimeout(()=>{a.remove();URL.revokeObjectURL(a.href);},150);
  toast('已导出 zhixue_export.json 到下载文件夹 —— 发我一句「导出了」，我写进源代码并部署');
}
function fbKey(sub,qid,pi){return sub+'|'+qid+'|'+pi;}
function qbReport(sub,qid,pi){
  const k=fbKey(sub,qid,pi); const cur=(FEEDBACK[k]&&FEEDBACK[k].text)||'';
  const v=prompt('报错 / 反馈（这一小问的具体问题，例如：截图过长、分值错、标签不对、Markscheme 含页码…）：', cur);
  if(v===null) return;
  if(v.trim()===''){ delete FEEDBACK[k]; toast('已清除该反馈'); }
  else { FEEDBACK[k]={text:v.trim(), ts:Date.now()}; toast('已记录反馈'); }
  saveFeedback(); renderPage();
}
function copyFeedback(){
  const keys=Object.keys(FEEDBACK); if(!keys.length) return toast('暂无反馈');
  const lines=keys.map(k=>{
    const [sub,qid,pi]=k.split('|'); const q=qFind(sub,qid)||{}; const p=(q.parts||[])[+pi]||{};
    const course=(SUBJECTS[sub]&&SUBJECTS[sub].name)||sub;
    return `【${course}】${q.source||qid} ${p.label||('小问'+pi)}\n  位置: ${p.img||q.stemImg||''}\n  反馈: ${FEEDBACK[k].text}`;
  });
  const txt='# 题库反馈（共 '+keys.length+' 条）\n'+lines.join('\n');
  if(navigator.clipboard&&navigator.clipboard.writeText){
    navigator.clipboard.writeText(txt).then(()=>toast('已复制 '+keys.length+' 条反馈，粘贴给我即可')).catch(()=>window.prompt('复制以下反馈发给我：', txt));
  } else { window.prompt('复制以下反馈发给我：', txt); }
}

function topicCats(t){return t.cats||[{id:t.id+'_all',n:null,kps:t.kps||[]}];}
function eachKp(sub,fn){(SUBJECTS[sub].topics||[]).forEach(t=>topicCats(t).forEach(c=>(c.kps||[]).forEach(k=>fn(k,c,t))));}
function kpName(sub,id){let r=id;eachKp(sub,(k)=>{if(k.id===id)r=k.n;});return r;}
function kpInfo(sub,id){let r=null;eachKp(sub,(k,c,t)=>{if(k.id===id)r={n:k.n,cat:c.n,topic:t.n};});return r;}
function kpOptionsHtml(sub,sel){
  return (SUBJECTS[sub].topics||[]).map(t=>topicCats(t).map(c=>{
    const lab=c.n?(t.n.replace(/^Topic \d+:\s*/,'')+' · '+c.n):t.n;
    return `<optgroup label="${lab}">`+c.kps.map(k=>`<option value="${k.id}" ${k.id===sel?'selected':''}>${k.n}</option>`).join('')+`</optgroup>`;
  }).join('')).join('');
}

function applyStruct(){for(const sub in SUBJECTS){SUBJECTS[sub].topics.forEach(t=>{(t.cats||[]).forEach(c=>{
  let kps=(CAT_BASE[K(sub,c.id)]||[]).filter(k=>!SYL_DELS.includes(K(sub,k.id))).map(k=>({id:k.id,n:k.n}));
  SYL_ADDS.filter(a=>a.sub===sub&&a.catId===c.id).forEach(a=>{SYL_BASE[K(sub,a.id)]=SYL_BASE[K(sub,a.id)]??a.n;kps.push({id:a.id,n:a.n});});
  c.kps=kps;});});}}
function applySyl(){for(const sub in SUBJECTS){SUBJECTS[sub].topics.forEach(t=>{t.n=SYL_EDITS[K(sub,t.id)]??SYL_BASE[K(sub,t.id)];topicCats(t).forEach(c=>{if(c.id&&SYL_BASE[K(sub,c.id)]!=null)c.n=SYL_EDITS[K(sub,c.id)]??SYL_BASE[K(sub,c.id)];(c.kps||[]).forEach(k=>{k.n=SYL_EDITS[K(sub,k.id)]??SYL_BASE[K(sub,k.id)]??k.n;});});});}}

function attr(s){return (s||'').replace(/"/g,'&quot;');}
function editSyl(sub,id,val){val=(val||'').trim();if(!val||val===SYL_BASE[K(sub,id)])delete SYL_EDITS[K(sub,id)];else SYL_EDITS[K(sub,id)]=val;localStorage.setItem('zhixue_syl_edits',JSON.stringify(SYL_EDITS));applySyl();renderPage();toast('已保存');}
function nextKpId(sub,catId){let mx=0;[...(CAT_BASE[K(sub,catId)]||[]),...SYL_ADDS.filter(a=>a.sub===sub&&a.catId===catId)].forEach(k=>{const m=(k.id||'').match(/\.(\d+)$/);if(m)mx=Math.max(mx,+m[1]);});return catId+'.'+(mx+1);}
function addKp(sub,catId){const inp=document.getElementById('addkp-'+catId);const v=(inp?inp.value:'').trim();if(!v)return toast('请输入知识点名称');const id=nextKpId(sub,catId);SYL_ADDS.push({sub,catId,id,n:v});SYL_BASE[K(sub,id)]=v;localStorage.setItem('zhixue_syl_adds',JSON.stringify(SYL_ADDS));applyStruct();applySyl();renderPage();toast('已新增 '+id+'：'+v);}
function delKp(sub,id){const ai=SYL_ADDS.findIndex(a=>a.sub===sub&&a.id===id);
  if(ai>=0)SYL_ADDS.splice(ai,1);else if(!SYL_DELS.includes(K(sub,id)))SYL_DELS.push(K(sub,id));
  delete SYL_EDITS[K(sub,id)];
  localStorage.setItem('zhixue_syl_adds',JSON.stringify(SYL_ADDS));localStorage.setItem('zhixue_syl_dels',JSON.stringify(SYL_DELS));localStorage.setItem('zhixue_syl_edits',JSON.stringify(SYL_EDITS));
  applyStruct();applySyl();renderPage();toast('已删除知识点');}

  const chosenIds=chosen.map(c=>c.id);
  let pool=[];
  (QB[sub]||[]).forEach(q=>{ if(!metaMatch(q))return; (q.parts||[]).forEach(p=>{
    if(!(p.kps||[]).some(k=>chosenIds.includes(k))) return;
    if((p.stars||3)>maxStars) return;
    pool.push({n:(p.kps||[]).map(k=>kpName(sub,k)).join('、'),q:p.text,img:p.img,ms:p.ms,marks:p.marks,stars:p.stars||3,
               src:(q.source||'')+' '+p.label,real:true,reviewed:q.status==='reviewed'});
  });});
  pool.sort((a,b)=>(a.reviewed?0:1)-(b.reviewed?0:1));
  if(pool.length<num){chosen.forEach(k=>{const qs=QBANK[k.id]||['（'+k.n+'）专项练习题（占位，待题库接入）'];qs.forEach(q=>pool.push({n:k.n,q,stars:3,real:false}));});}
  if(!pool.length)return toast('当前筛选下暂无匹配小问');
  const qs=[];for(let i=0;i<num;i++){const p=pool[i%pool.length];qs.push(p);}
  S()._bkGen={sub,mode:'kp',title:`已生成 ${num} 小问（知识点组卷）`,qs};
  bankOut(S()._bkGen);toast('已生成练习');
}
function genPaper(sub){
  let src=(QB[sub]||[]).filter(q=>metaMatch(q)&&(q.parts||[]).length);
  if(!src.length)return toast('该筛选下没有匹配试卷');
  src.sort((a,b)=>(a.paper||'').localeCompare(b.paper||'')||qNumOf(a)-qNumOf(b));
  const qs=[];
  src.forEach(q=>(q.parts||[]).forEach((p,pi)=>qs.push({n:(q.source||'')+' '+p.label,q:p.text,img:p.img,ms:p.ms,marks:p.marks,stars:p.stars||3,
    src:(q.source||'')+' '+p.label,stemImg:pi===0?q.stemImg:null,real:true})));
  const totalMarks=src.reduce((a,q)=>a+(q.marks||0),0);
  S()._bkGen={sub,mode:'paper',title:`整张卷 · ${src.length} 题 / ${qs.length} 小问 · 共 ${totalMarks} 分`,qs};
  bankOut(S()._bkGen);toast('已组整张卷');
}

function ltChart(scores,cfg){
  if(!scores.length)return '<div class="empty">暂无成绩，录入后显示趋势</div>';
  const W=620,H=170,pad=34;
  const max=cfg.max,min=cfg.max>9?Math.min(...scores.map(s=>s.t))-3:4;
  const xs=(i)=>pad+(scores.length>1?i/(scores.length-1):0.5)*(W-pad*2);
  const ys=(v)=>H-24-((v-min)/(max-min))*(H-50);
  const line=scores.map((s,i)=>`${xs(i)},${ys(s.t)}`).join(' ');
  const dots=scores.map((s,i)=>`<circle cx="${xs(i)}" cy="${ys(s.t)}" r="5" fill="${s.type==='实考'?'#22b07d':'#8b5cf6'}"></circle>
    <text x="${xs(i)}" y="${ys(s.t)-10}" font-size="11" fill="${s.type==='实考'?'#22b07d':'#8b5cf6'}" text-anchor="middle" font-weight="700">${s.t}</text>
    <text x="${xs(i)}" y="${H-6}" font-size="10" fill="#9197ad" text-anchor="middle">${s.d}</text>`).join('');
  return `<svg viewBox="0 0 ${W} ${H}" style="width:100%;height:auto">
    <line x1="${pad}" y1="${H-24}" x2="${W-pad}" y2="${H-24}" stroke="#eceef5"></line>
    <polyline points="${line}" fill="none" stroke="#cabfff" stroke-width="2.5"></polyline>${dots}</svg>`;
}

      <div class="rs-h"><span class="num">2</span>教学投入</div>
      <div class="grid g4" style="grid-template-columns:repeat(5,1fr)">${matRow}</div>
      <div style="font-size:12.5px;color:var(--ink-3);margin-top:10px"><i class="ti ti-info-circle"></i> 本学期累计沉淀板书、作业、模考等教学材料，全程可追溯。</div>
    </div>

    <div class="card rep-sec">
      <div class="rs-h"><span class="num">3</span>升学规划</div>
      <div style="font-size:12px;color:var(--ink-3);margin-bottom:8px">目标院校梯队</div>
      ${schools}
      <div style="font-size:12px;color:var(--ink-3);margin:14px 0 6px">档案完成度：${done}/${total} 项</div>
      <div class="bar" style="height:8px"><i style="width:${pct}%;background:linear-gradient(90deg,var(--brand),var(--violet))"></i></div>
    </div>

    <div class="card rep-sec">
      <div class="rs-h"><span class="num">4</span>近期沟通</div>
      <div class="tl">${comm}</div>
    </div>

    ${langSec}

    <div style="text-align:center;color:var(--ink-3);font-size:12px;padding:10px">本报告由智学档案系统自动生成 · 数据更新至 ${new Date().getFullYear()}.${(new Date().getMonth()+1+'').padStart(2,'0')}.${(new Date().getDate()+'').padStart(2,'0')}</div>
  </div>`;
}

function exportPDF(){
  if(curPage!=='report'){goPage('report');}
  setTimeout(()=>{
    const el=document.getElementById('report-doc');
    toast('正在生成 PDF…');
    html2pdf().set({margin:[8,8,8,8],filename:`${curStuObj().name}_成长报告.pdf`,
      image:{type:'jpeg',quality:.98},html2canvas:{scale:2,useCORS:true,backgroundColor:'#ffffff'},
      jsPDF:{unit:'mm',format:'a4',orientation:'portrait'}}).from(el).save();
  },200);
}

/* ============================================================
   STUDENT PICKER MODAL
============================================================ */
function openStuPicker(){
  const m=document.getElementById('modal');
  m.innerHTML=`<h3>切换学生</h3><div class="sub">选择要查看 / 编辑档案的学员</div>
    <div class="fields">${STUDENTS.map(s=>`<div class="chk-item" style="cursor:pointer" onclick="pickStu('${s.id}');closeModal();renderPage()">
      <div class="avatar" style="background:${s.avatar.bg};color:${s.avatar.c}">${s.avatar.t}</div>
      <div style="flex:1"><div style="font-weight:500">${s.name} ${s.en}</div><div style="font-size:12px;color:var(--ink-3)">${s.sys} · ${s.target}</div></div>
      ${s.id===curStu?'<i class="ti ti-check" style="color:var(--brand);font-size:18px"></i>':''}
    </div>`).join('')}</div>`;
  document.getElementById('modal-bg').classList.add('on');
}
function pickStu(id){curStu=id;renderTopbar();}
function closeModal(){document.getElementById('modal-bg').classList.remove('on');}
document.getElementById('modal-bg').addEventListener('click',e=>{if(e.target.id==='modal-bg')closeModal();});

/* ============================================================
   TOAST
============================================================ */
let toastT;
function toast(msg){const t=document.getElementById('toast');t.innerHTML=`<i class="ti ti-circle-check"></i> ${msg}`;t.classList.add('on');clearTimeout(toastT);toastT=setTimeout(()=>t.classList.remove('on'),2200);}

/* ============================================================
   INIT
============================================================ */
setRole('teach');
</script>
</body>
</html>
